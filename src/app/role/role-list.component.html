<div align="center">
  <h1>Role List</h1>

  <table>
    <tr>
      <th>Role Name</th>
      <td><input type="text" name="name" [(ngModel)]="form.searchParam.name" placeholder="search by roleName">&nbsp;</td>
      <td><input type="text" name="description" [(ngModel)]="form.searchParam.description" placeholder="search by description">&nbsp;</td>
      <td><button (click)="search()">search</button></td>
    </tr>
  </table>
  <table border="1" width="100%" >
    <tr style="background-color: skyblue;">
      <th>Role ID</th>
      <th>Role Name</th>
      <th>Description</th>
      <th>Edit</th>
    </tr>
    <tr *ngFor="let role of form.list" align="center">
      <td>{{ role.id }}</td>
      <td>{{ role.name }}</td>
      <td>{{ role.description }}</td>
      <td><a (click)="edit('/role/' + role.id)"><span style="color: blue;">Edit</span></a></td>
    </tr>
  </table>
  <table width="100%">
    <tr>
      <td>
        <button [disabled]="form.pageNo==0" (click)="previous()">Previous</button>
      </td>
      <td align="right">
        <button [disabled]="form.list.length < 5" (click)="next()">Next</button>
      </td>
    </tr>
  </table>
</div>
